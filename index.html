// AÇÕES
// ═══════════════════════════════════════════════════════════════
async function fazerLogin(){
  var em=document.getElementById('iem');
  var pw=document.getElementById('ipw');
  if(!em||!pw)return;
  var email=em.value.trim().toLowerCase();
  var pass=pw.value;
  if(!email||!pass){S.erro='Informe e-mail e senha.';render();return;}

  var btn=document.getElementById('btn-entrar');
  if(btn){btn.disabled=true;btn.textContent='Entrando…';}

  try {
    var res = await sb.auth.signInWithPassword({email: email, password: pass});
    if(res.error){
      S.erro = 'E-mail ou senha inválidos.';
      console.error(res.error);
      render();
      return;
    }
    var perfil = PERFIS[email];
    if(!perfil){
      S.erro = 'Usuário não autorizado.';
      await sb.auth.signOut();
      render();
      return;
    }
    S.user = {email: email, name: perfil.name, role: perfil.role};
    S.erro = null;
    render();
    var ok = await carregarDados();
    if(ok) render();
  } catch(e){
    S.erro = 'Erro ao conectar. Tente novamente.';
    console.error(e);
    render();
  }
}

async function sair(){
  await sb.auth.signOut();
  S.user = null;
  S.ready = false;
  S.tab = 'dashboard';
  S.META = null; S.MAIO = null; S.HIST = []; S.LANC = []; S.PACIENTES = []; S.ATEND = []; S.AVAL = []; S.PAC_NOMES = {};
  S.semOffset = 0; S.atView = null; S.atEdit = null; S.caixaEdit = false;
  render();
}

async function salvar(){
  var f=S.form;
  var valor=parseFloat(f.valor);
  if(!f.desc.trim()){showToast('Descrição obrigatória.',true);return;}
  if(isNaN(valor)||valor<=0){showToast('Valor inválido.',true);return;}

  var nParc = (f.tipo==='despesa' && f.parcelas>1) ? Math.min(36, Math.floor(f.parcelas)) : 1;

  var btn=document.getElementById('btn-salvar');
  if(btn){btn.disabled=true;btn.textContent='Salvando…';}

  var registros=[];
  if(nParc>1){
    // Compra parcelada: gera N lançamentos (total ÷ N), vencimento avançando 1 mês. Arredondamento sobra na última.
    var baseVenc = f.venc || hojeISO();
    var pBase = Math.round((valor/nParc)*100)/100;
    var desc = f.desc.trim();
    for(var i=0;i<nParc;i++){
      var pv = (i<nParc-1) ? pBase : Math.round((valor - pBase*(nParc-1))*100)/100;
      registros.push({
        tipo: f.tipo,
        descricao: desc+' ('+(i+1)+'/'+nParc+')',
        valor: pv,
        flag: f.flag,
        cat: f.cat,
        venc: addMonthsISO(baseVenc, i),
        obs: f.obs.trim() || null,
        data: today(),
        por: S.user.name,
        em: nowStr(),
        origem: 'manual'
      });
    }
  } else {
    registros.push({
      tipo: f.tipo,
      descricao: f.desc.trim(),
      valor: valor,
      flag: f.flag,
      cat: f.tipo==='despesa' ? f.cat : null,
      venc: f.tipo==='despesa' && f.venc ? f.venc : null,
      obs: f.obs.trim() || null,
      data: today(),
      por: S.user.name,
      em: nowStr(),
      origem: 'manual'
    });
  }

  try {
    var res = await sb.from('nd_lancamentos').insert(registros).select();
    if(res.error){
      console.error(res.error);
      showToast('Erro ao salvar: '+res.error.message,true);
      if(btn){btn.disabled=false;btn.textContent='💾 Salvar Lançamento';}
      return;
    }
    for(var r=0;r<res.data.length;r++) S.LANC.push(res.data[r]);
    S.form = {tipo:'despesa', desc:'', valor:'', flag:'conjunta', cat:'fixo', venc:'', obs:'', parcelas:1};
    S.tab = 'dashboard';
    showToast(nParc>1 ? (nParc+' parcelas lançadas ✅') : 'Lançamento salvo ✅');
  } catch(e){
    console.error(e);
    showToast('Erro ao salvar.',true);
    if(btn){btn.disabled=false;btn.textContent='💾 Salvar Lançamento';}
  }
}

// ═══════════════════════════════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════════════
async function init(){
  // Tenta restaurar sessão existente (login persistente)
  var session = await sb.auth.getSession();
  if(session.data && session.data.session){
    var email = session.data.session.user.email;
    var perfil = PERFIS[email];
    if(perfil){
      S.user = {email: email, name: perfil.name, role: perfil.role};
      var ok = await carregarDados();
      S.loading = false;
      render();
      return;
    } else {
      await sb.auth.signOut();
    }
  }
  S.loading = false;
  render();
}

init();
</script>
