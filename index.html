<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B2A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ND Financeiro">
<title>ND Fisioterapia — Controle Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--amber:#E8A020;--cream:#F5F3EE;--neia:#BDD7EE;--neia-d:#2E75B6;--dany:#C6E0B4;--dany-d:#375623;--red:#C0392B;--green:#1F5C1F;--white:#FFFFFF;--gray:#8B8B8B;--prov:#FCE4D6;--warn:#FFF3CD;--r:16px;--r2:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#E8E5DE;font-family:'DM Sans',sans-serif}
#app{height:100%}

.ls{min-height:100vh;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.ll h1{font-family:'DM Serif Display',serif;color:var(--amber);font-size:30px;text-align:center}
.ll p{color:rgba(255,255,255,.45);font-size:12px;margin-top:6px;letter-spacing:1.5px;text-transform:uppercase;text-align:center;margin-bottom:48px}
.lc{background:white;border-radius:var(--r);padding:32px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(27,42,74,.18)}
.lc h2{font-family:'DM Serif Display',serif;color:var(--navy);font-size:22px;margin-bottom:24px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--navy);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.fg input,.fg select,.fg textarea{width:100%;padding:13px 15px;border:1.5px solid #E0DDD6;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--navy);background:var(--cream);outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,160,32,.12)}
.btn{display:block;width:100%;padding:15px;background:var(--amber);color:var(--navy);border:none;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.btn:hover{filter:brightness(1.05)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-sec{background:transparent;color:var(--navy);border:1.5px solid #E0DDD6}
.btn-sm{padding:9px 15px;font-size:13px;width:auto;display:inline-block}
.err{background:#FEE;border-left:3px solid var(--red);padding:12px 16px;border-radius:8px;font-size:13px;color:var(--red);margin-bottom:16px}
.loading{min-height:100vh;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--amber)}
.loading-dot{width:10px;height:10px;border-radius:50%;background:var(--amber);margin:0 4px;animation:bounce 1.4s infinite ease-in-out both;display:inline-block}
.loading-dot:nth-child(1){animation-delay:-.32s}.loading-dot:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

.app{display:flex;flex-direction:column;height:100vh;max-width:540px;margin:0 auto;background:var(--cream);box-shadow:0 0 40px rgba(27,42,74,.12)}
.hdr{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr h1{font-family:'DM Serif Display',serif;color:var(--amber);font-size:18px}
.ubadge{background:rgba(255,255,255,.12);color:white;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.udot{width:8px;height:8px;border-radius:50%}
.content{flex:1;overflow-y:auto;padding:16px 14px 90px}
.bnav{position:fixed;bottom:0;background:white;border-top:1px solid #E8E5DE;display:flex;padding:8px 0 20px;box-shadow:0 -4px 20px rgba(27,42,74,.08);z-index:100;width:100%;max-width:540px;left:50%;transform:translateX(-50%)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;cursor:pointer;color:var(--gray);font-size:10px;font-weight:500;border:none;background:none}
.ni.active{color:var(--navy)}
.ni-icon{font-size:20px;line-height:1}

.card{background:white;border-radius:var(--r);padding:18px;box-shadow:0 2px 12px rgba(27,42,74,.08);margin-bottom:12px}
.card-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:10px}

.meta{background:white;border-radius:var(--r);padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(27,42,74,.08);border-left:3px solid var(--amber)}
.meta-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px}
.meta-row:not(:last-child){border-bottom:1px solid #F0EDE8;padding-bottom:6px;margin-bottom:6px}
.meta-icon{font-size:14px;width:20px;flex-shrink:0}
.meta-l{color:var(--gray);font-weight:500;flex-shrink:0;min-width:110px;font-size:11px}
.meta-v{color:var(--navy);font-weight:600;text-align:right;flex:1;font-size:11px}

.hero{background:var(--navy);border-radius:var(--r);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(232,160,32,.07)}
.hero-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.5);margin-bottom:14px}
.scards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sc{background:rgba(255,255,255,.08);border-radius:12px;padding:14px 12px;min-width:0}
.sc.neia{border-top:2px solid var(--neia)}
.sc.dany{border-top:2px solid var(--dany)}
.sc-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sc-name.neia{color:var(--neia)}
.sc-name.dany{color:var(--dany)}
.sc-line{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.sc-line-l{font-size:10px;color:rgba(255,255,255,.45)}
.sc-line-v{font-size:10px;color:rgba(255,255,255,.7)}
.sc-disp{display:flex;flex-direction:column;align-items:flex-start;padding-top:8px;margin-top:6px;border-top:2px solid rgba(255,255,255,.15)}
.sc-disp-l{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-disp-v{font-family:'DM Serif Display',serif;font-size:20px;font-weight:700;color:white;line-height:1}
.sc-alert{font-size:10px;color:#FFB347;margin-top:4px}
.hero-tl{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px}
.hero-tv{font-family:'DM Serif Display',serif;font-size:30px;color:var(--amber);line-height:1}

.evo-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.evo-col{flex-shrink:0;text-align:center;width:60px}
.evo-mes{font-size:9px;font-weight:600;text-transform:uppercase;color:var(--gray);margin-bottom:6px}
.evo-bw{height:80px;display:flex;align-items:flex-end;justify-content:center;gap:3px}
.evo-b{width:18px;border-radius:4px 4px 0 0;min-height:4px}
.evo-b.rec{background:var(--neia)}
.evo-b.res{background:var(--amber)}
.evo-b.fut{background:#E0DDD6}
.evo-v{font-size:9px;color:var(--navy);margin-top:4px;font-weight:600}

.tx{background:white;border-radius:var(--r2);padding:13px 15px;box-shadow:0 2px 8px rgba(27,42,74,.06);display:flex;align-items:center;gap:11px;margin-bottom:8px}
.tx-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tx-icon.rec{background:rgba(198,224,180,.3)}
.tx-icon.desp{background:rgba(254,215,215,.5)}
.tx-icon.conj{background:rgba(255,236,153,.4)}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:13px;font-weight:500;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--gray);margin-top:1px}
.tx-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:2px}
.tag-n{background:var(--neia);color:var(--neia-d)}
.tag-d{background:var(--dany);color:var(--dany-d)}
.tag-c{background:#FFF3CD;color:#856404}
.tx-amt{font-family:'DM Serif Display',serif;font-size:15px;white-space:nowrap}
.tx-amt.pos{color:var(--green)}
.tx-amt.neg{color:var(--red)}

/* ── PACIENTES ── */
.pac-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.pac-h-l{display:flex;flex-direction:column}
.pac-h-tt{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);line-height:1.1}
.pac-h-sub{font-size:11px;color:var(--gray);margin-top:2px}
.pac-add{background:var(--amber);color:var(--navy);border:none;border-radius:var(--r2);font-weight:700;font-size:13px;padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:6px}
.pac-filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.pac-filters::-webkit-scrollbar{display:none}
.pac-fbtn{background:white;border:1.5px solid #E0DDD6;color:var(--navy);border-radius:30px;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pac-fbtn.on{background:var(--navy);color:white;border-color:var(--navy)}
.pac-grp{margin-bottom:18px}
.pac-grp-tt{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin:0 0 8px 4px;display:flex;align-items:center;gap:6px}
.pac-grp-tt.neia::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--neia-d)}
.pac-grp-tt.dany::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--dany-d)}
.pac{background:white;border-radius:var(--r2);padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:11px;border-left:3px solid #E0DDD6;cursor:pointer}
.pac.neia{border-left-color:var(--neia-d)}
.pac.dany{border-left-color:var(--dany-d)}
.pac-info{flex:1;min-width:0}
.pac-nome{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:3px}
.pac-meta{font-size:11px;color:var(--gray);display:flex;gap:8px;flex-wrap:wrap}
.pac-meta span{display:inline-flex;align-items:center;gap:3px}
.pac-r{text-align:right}
.pac-v{font-family:'DM Serif Display',serif;font-size:15px;color:var(--navy);font-weight:600;line-height:1}
.pac-bd{font-size:10px;font-weight:700;padding:2px 7px;border-radius:30px;display:inline-block;margin-top:4px;letter-spacing:.3px}
.bd-ativo{background:#E8F5E8;color:#1F5C1F}
.bd-pausado{background:#FFF3CD;color:#856404}
.bd-alta{background:#E8E5DE;color:#6B6B6B}
.bd-avaliacao{background:var(--amber);color:var(--navy)}
.pac-empty{background:white;border-radius:var(--r2);padding:32px 20px;text-align:center;color:var(--gray)}
.pac-empty p{font-size:13px;margin-top:8px}
.pac-vf{font-size:11px;color:var(--gray);text-align:center;background:#FFF8E1;padding:9px;border-radius:var(--r2);margin-bottom:14px;border:1px solid #F0E0B0}
.pf-actions{display:flex;gap:8px;margin-top:18px}
.pf-actions .btn{flex:1}
.pf-status{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.pf-st{padding:11px 8px;border:1.5px solid #E0DDD6;border-radius:var(--r2);background:white;cursor:pointer;font-size:12px;font-weight:600;color:var(--navy);text-align:center}
.pf-st.on{background:var(--navy);color:white;border-color:var(--navy)}
.pf-st.on.ativo{background:#1F5C1F;border-color:#1F5C1F}
.pf-st.on.alta{background:#6B6B6B;border-color:#6B6B6B}

.h-row{background:white;border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(27,42,74,.06)}
.h-row.atual{border-left:3px solid var(--amber)}
.h-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.h-title{font-size:13px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.chip-ok{background:rgba(31,92,31,.1);color:var(--green)}
.chip-wip{background:rgba(232,160,32,.15);color:#7D5A00}
.h-sum{display:flex;justify-content:space-between;margin-top:6px}
.h-det{margin-top:12px;border-top:1px solid #F0EDE8;padding-top:12px;display:none}
.h-det.open{display:block}
.h-line{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.h-line:not(:last-child){border-bottom:1px solid #F8F6F2}
.h-ll{font-size:12px;color:var(--gray);flex:1}
.h-ln{font-size:12px;color:var(--neia-d);font-weight:500;min-width:80px;text-align:right}
.h-ld{font-size:12px;color:var(--dany-d);font-weight:500;min-width:80px;text-align:right}

.ftt{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:18px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rc{border:2px solid #E0DDD6;border-radius:var(--r2);padding:13px;cursor:pointer;text-align:center}
.rc.sel{border-color:var(--amber);background:rgba(232,160,32,.06)}
.rc-i{font-size:22px;margin-bottom:5px}
.rc-l{font-size:12px;font-weight:600;color:var(--navy)}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fb{border:2px solid #E0DDD6;border-radius:var(--r2);padding:11px 6px;cursor:pointer;text-align:center;background:none;font-family:'DM Sans',sans-serif}
.fb.sc{border-color:#856404;background:#FFF3CD}
.fb.sn{border-color:var(--neia-d);background:var(--neia)}
.fb.sd{border-color:var(--dany-d);background:var(--dany)}
.fb span{display:block;font-size:11px;font-weight:600;color:var(--navy);margin-top:3px}
.split{background:var(--cream);border-radius:var(--r2);padding:13px;margin-top:10px}
.sr{display:flex;justify-content:space-between;padding:5px 0}
.sr:not(:last-child){border-bottom:1px solid #E0DDD6}

.aud{background:white;border-radius:var(--r2);padding:13px 15px;margin-bottom:8px;box-shadow:0 2px 8px rgba(27,42,74,.06)}
.aud-h{display:flex;justify-content:space-between;margin-bottom:5px}
.aud-u{font-size:11px;font-weight:600;color:var(--amber)}
.aud-t{font-size:11px;color:var(--gray)}
.aud-d{font-size:13px;color:var(--navy);font-weight:500}
.aud-x{font-size:11px;color:var(--gray);margin-top:2px}

.stt{font-family:'DM Serif Display',serif;font-size:20px;color:var(--navy);margin-bottom:12px}
.ssub{font-size:12px;color:var(--gray);margin-top:-8px;margin-bottom:12px}
.empty{text-align:center;padding:40px 20px;color:var(--gray)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:13px 22px;border-radius:30px;font-size:13px;font-weight:500;z-index:9999}
.toast.err{background:var(--red)}

/* ── ATENDIMENTOS (Onda 2.A) ── */
.at-week{display:flex;align-items:center;justify-content:space-between;gap:10px;background:white;border-radius:var(--r2);padding:8px 10px;margin-bottom:12px;box-shadow:0 2px 8px rgba(27,42,74,.06)}
.at-wnav{background:var(--cream);border:1.5px solid #E0DDD6;border-radius:10px;padding:6px 13px;cursor:pointer;font-size:14px;color:var(--navy);flex-shrink:0}
.at-wlbl{font-size:13px;font-weight:700;color:var(--navy);text-align:center}
.at-wsub{font-size:10px;color:var(--gray);text-align:center;margin-top:1px}
.at-wprev{font-size:11px;font-weight:700;color:var(--green);text-align:center;margin-top:3px}
.at-toggle{display:flex;gap:8px;margin-bottom:14px}
.at-toggle .pac-fbtn{flex:1;text-align:center}
.ag-coltoggle{display:flex;gap:6px;margin-bottom:10px}
.ag-coltoggle .pac-fbtn{flex:1;text-align:center;padding:7px 4px}
.ag2-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
.ag2-col{min-width:0}
.ag2-col-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:center;padding:3px 0;margin-bottom:6px;border-radius:6px}
.ag2-col-h.dany{background:var(--dany);color:var(--dany-d)}
.ag2-col-h.neia{background:var(--neia);color:var(--neia-d)}
.ag2-col .at-card{padding:9px 10px}
.ag2-col .at-hora{min-width:38px;font-size:14px}
.rec-sub{font-size:12px;color:var(--gray);margin:-4px 0 12px}
.rec-m{padding:9px 0;border-bottom:1px solid #EFEDE8}
.rec-m:last-child{border-bottom:none}
.rec-m-top{display:flex;justify-content:space-between;align-items:baseline}
.rec-m-mes{font-size:13px;font-weight:700;color:var(--navy)}
.rec-m-tot{font-size:14px;font-weight:700;color:var(--green)}
.rec-m-det{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:3px}
.rec-conf{font-size:11px;color:var(--green)}
.rec-prev{font-size:11px;color:var(--gray)}
.rec-empty{font-size:12px;color:var(--gray);padding:6px 0}
.at-day{margin-bottom:16px}
.at-day-tt{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin:0 0 8px 4px}
.at-day-empty{font-size:12px;color:#BBB;padding:2px 4px 6px;font-style:italic}
.at-card{background:white;border-radius:var(--r2);padding:11px 13px;margin-bottom:8px;box-shadow:0 2px 8px rgba(27,42,74,.06);border-left:3px solid #E0DDD6}
.at-card.neia{border-left-color:var(--neia-d)}
.at-card.dany{border-left-color:var(--dany-d)}
.at-card.aval{border-left-color:#7C5CBF;background:#FBF9FF}
.av-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#EDE6FA;color:#5B3D9E;white-space:nowrap;flex-shrink:0}
.av-conv{display:flex;gap:6px;margin-top:9px}
.av-conv-btn{flex:1;background:#5B3D9E;color:white;border:none;border-radius:20px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer}
.av-conv-no{background:white;border:1px solid #E0DDD6;border-radius:20px;padding:7px 12px;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;white-space:nowrap}
.av-conv-done{margin-top:9px;font-size:11px;font-weight:700;padding:6px 10px;border-radius:8px;text-align:center}
.av-conv-done.ok{background:rgba(31,92,31,.1);color:var(--green)}
.av-conv-done.no{background:#F0EDE8;color:var(--gray)}
.at-top{display:flex;align-items:center;gap:9px}
.at-hora{font-family:'DM Serif Display',serif;font-size:15px;color:var(--navy);min-width:46px}
.at-nome{font-size:14px;font-weight:700;color:var(--navy);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.at-serie{font-size:11px;margin-left:5px}
.at-del{background:none;border:none;cursor:pointer;font-size:13px;opacity:.55;flex-shrink:0;padding:0 2px}
.at-del:hover{opacity:1}
.at-actions{display:flex;gap:5px;overflow-x:auto;margin-top:9px;padding-bottom:2px}
.at-actions::-webkit-scrollbar{display:none}
.at-act{background:white;border:1px solid #E0DDD6;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:600;color:var(--navy);cursor:pointer;white-space:nowrap;flex-shrink:0}
.at-act.on{background:var(--navy);color:white;border-color:var(--navy)}
.at-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.at-agendado{background:rgba(232,160,32,.15);color:#7D5A00}
.at-realizado{background:rgba(31,92,31,.12);color:var(--green)}
.at-falta_faturada{background:var(--prov);color:#9C4221}
.at-falta_nao_faturada{background:#E8E5DE;color:#6B6B6B}
.at-remarcado{background:var(--neia);color:var(--neia-d)}
.at-cancelado{background:#FEE;color:var(--red)}

/* ── RESULTADOS (painel anual) ── */

function fmt(v){return 'R$\u00A0'+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtS(v){return v<0?'('+fmt(v)+')':fmt(v)}
function fmtMesRef(ref){
  // Converte '2026-06' para 'Junho 2026'
  if(!ref) return '';
  var nomes=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var partes=ref.split('-');
  if(partes.length!==2) return ref;
  var ano=partes[0];
  var mes=parseInt(partes[1],10)-1;
  if(mes<0||mes>11) return ref;
  return nomes[mes]+' '+ano;
}
function today(){return new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}
function nowStr(){return new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}

async function carregarDados(){
  try {
    var [meta, saldos, hist, lanc, pac, atend, pacAll, aval] = await Promise.all([
      sb.from('nd_meta').select('*').eq('id',1).single(),
      sb.from('nd_saldos_mes').select('*').eq('id',1).single(),
      sb.from('nd_historico').select('*').order('ordem',{ascending:true}),
      sb.from('nd_lancamentos').select('*').order('created_at',{ascending:true}),
      sb.from('nd_pacientes').select('*').eq('excluido', false).order('nome',{ascending:true}),
      sb.from('nd_atendimentos').select('*').eq('excluido', false).order('data_hora',{ascending:true}),
      sb.from('nd_pacientes').select('id,nome'),
      sb.from('nd_avaliacoes').select('*').eq('excluido', false).order('data_hora',{ascending:true})
    ]);

    if(meta.error) throw new Error('meta: '+meta.error.message);
    if(saldos.error) throw new Error('saldos: '+saldos.error.message);
    if(hist.error) throw new Error('hist: '+hist.error.message);
    if(lanc.error) throw new Error('lanc: '+lanc.error.message);
    if(pac.error) throw new Error('pacientes: '+pac.error.message);
    if(atend.error) throw new Error('atendimentos: '+atend.error.message);
    if(pacAll.error) throw new Error('pacientes(nomes): '+pacAll.error.message);
    if(aval.error) throw new Error('avaliacoes: '+aval.error.message);

    S.META = meta.data;
    S.MAIO = saldos.data;
    S.HIST = hist.data;
    S.LANC = lanc.data;
    S.PACIENTES = pac.data || [];
    S.ATEND = atend.data || [];
    S.AVAL = aval.data || [];
    // Mapa id->nome de TODOS os pacientes (inclui excluídos) para a agenda não perder o nome
    S.PAC_NOMES = {};
    if(pacAll.data) for(var pn=0;pn<pacAll.data.length;pn++) S.PAC_NOMES[pacAll.data[pn].id]=pacAll.data[pn].nome;
    S.ready = true;
    return true;
  } catch(e){
    console.error('Erro ao carregar dados:', e);
    showToast('Erro ao carregar dados. Tente novamente.', true);
    return false;
  }
}

// CÁLCULOS (usam S.MAIO e S.LANC)
// ═══════════════════════════════════════════════════════════════
function calcDisp(){
  // Mês de referência atual ('YYYY-MM'): compras/parcelas com vencimento FUTURO não entram no disponível agora
  var mesAtual = (S.MAIO && S.MAIO.mes_ref) ? String(S.MAIO.mes_ref).slice(0,7) : '';
  var rn=0,rd=0,dn=0,dd=0;
  for(var i=0;i<S.LANC.length;i++){
    var t=S.LANC[i];
    // Lançamentos do extrato já estão computados em rec_n/d e desp_n/d via nd_saldos_mes
    // Só somamos os lançamentos manuais (origem='manual') para evitar dupla contagem
    if(t.origem==='extrato') continue;
    if(t.tipo==='receita'){
      if(t.flag==='neia') rn+=Number(t.valor);
      else rd+=Number(t.valor);
    } else {
      // Despesa parcelada/futura: só reduz o disponível quando vence neste mês ou antes
      var vmes = t.venc ? String(t.venc).slice(0,7) : null;
      if(vmes && mesAtual && vmes > mesAtual) continue;
      if(t.flag==='conjunta'){dn+=Number(t.valor)/2;dd+=Number(t.valor)/2;}
      else if(t.flag==='neia') dn+=Number(t.valor);
      else dd+=Number(t.valor);
    }
  }
  var M=S.MAIO;
  // Custos fixos da empresa rateados 50/50 entre as dras (hoje: contabilidade; futuro: água/luz/internet)
  var contabMeta = (M.contabilidade!=null) ? Number(M.contabilidade)/2 : 0;
  return {
    neia: Number(M.ant_n)+Number(M.rec_n)+rn-Number(M.desp_n)-dn-Number(M.plab_n)-Number(M.prov_n)-contabMeta,
    dany: Number(M.ant_d)+Number(M.rec_d)+rd-Number(M.desp_d)-dd-Number(M.plab_d)-Number(M.prov_d)-contabMeta,
    rn:rn, rd:rd, dn:dn, dd:dd, contab:contabMeta  // manuais por sócia + contabilidade rateada 50/50
  };
}

function renderDash(){

  var M=S.MAIO;

  var sCard=function(name,cls,ant,rec,desp,compras,plab,prov,contab,disp_val){
    var isLow=disp_val<=0;
    var dispTxt=isLow?'R$\u00A00,00':fmt(disp_val);
    var alertTxt=isLow?'<div class="sc-alert">Aguardando próximas receitas</div>':'';
    var comprasLine=compras>0?'<div class="sc-line"><span class="sc-line-l">(–) Compras do mês</span><span class="sc-line-v">('+fmt(compras)+')</span></div>':'';
    var contabLine=contab>0?'<div class="sc-line"><span class="sc-line-l">(–) Contabilidade (50%)</span><span class="sc-line-v">('+fmt(contab)+')</span></div>':'';
    var plabLine=plab>0?'<div class="sc-line"><span class="sc-line-l">(–) Pró-labore</span><span class="sc-line-v">('+fmt(plab)+')</span></div>':'';
    return '<div class="sc '+cls+'">'
      +'<div class="sc-name '+cls+'">'+name+'</div>'
      +'<div class="sc-line"><span class="sc-line-l">Saldo anterior</span><span class="sc-line-v">'+fmt(ant)+'</span></div>'
      +'<div class="sc-line"><span class="sc-line-l">+ Receitas mês</span><span class="sc-line-v">'+fmt(rec)+'</span></div>'
      +'<div class="sc-line"><span class="sc-line-l">(–) Despesas operac.</span><span class="sc-line-v">('+fmt(desp)+')</span></div>'
      +comprasLine
      +plabLine

      +contabLine
      +'<div class="sc-disp"><span class="sc-disp-l">Disponível agora</span><span class="sc-disp-v">'+dispTxt+'</span></div>'
      +alertTxt+'</div>';
  };

  var maxRec=15000;
  for(var i=0;i<S.HIST.length;i++){var r=Number(S.HIST[i].rec_n)+Number(S.HIST[i].rec_d);if(r>maxRec)maxRec=r;}

  var barras='';
  for(var j=0;j<S.HIST.length;j++){
    var m=S.HIST[j];
    var totRec=Number(m.rec_n)+Number(m.rec_d);
    var totRes=Math.max(0,Number(m.res_n)+Number(m.res_d));
    var h=Math.round((totRec/maxRec)*70);
    var hr=Math.round((totRes/maxRec)*70);
    barras+='<div class="evo-col"><div class="evo-mes">'+MESES[j]+'</div>'

function renderCaixaEmpresa(totalDisp){
  var M=S.MAIO;
  var extrato=Number(M.extrato)||0;
  var contab=Number(M.contabilidade)||0;
  var provisao=Number(M.prov_n)+Number(M.prov_d);
  var reserva=(M.reserva_min!=null)?Number(M.reserva_min):RESERVA_MIN;
  // Modelo (A): o imposto já está representado pela provisão (≈6% do faturamento) — uma linha só, sem DAS/INSS separados (evita contar em dobro).
  var caixaLivre=extrato-contab-provisao-reserva;
  var margem=caixaLivre-totalDisp;
  var ok=margem>=0;
  var canEdit=S.user.role==='fabio';

  if(S.caixaEdit && canEdit){
    return '<div class="card cx-card">'
      +'<div class="card-title">Caixa da empresa · ajustar obrigações</div>'
      +'<p class="cx-help">Custos fixos da empresa neste mês. O imposto (provisão ≈6% do faturamento) já é calculado — não se digita aqui.</p>'
      +'<div class="fg"><label>Contabilidade</label><input type="number" id="cx-contab" step="0.01" min="0" value="'+contab+'"></div>'
      +'<div class="fg"><label>Reserva mínima de segurança</label><input type="number" id="cx-reserva" step="0.01" min="0" value="'+reserva+'"></div>'
      +'<div class="pf-actions"><button class="btn btn-sec" id="btn-cx-cancelar">Cancelar</button><button class="btn" id="btn-cx-salvar">Salvar</button></div>'
      +'</div>';
  }

  function ln(label,val,cls,note){
    var disp = val<0 ? '('+fmt(Math.abs(val))+')' : fmt(val);
    var vcls = (val===0) ? 'cx-zero' : (cls||'');
    return '<div class="cx-row"><span class="cx-l">'+label+(note?'<span class="cx-note">'+note+'</span>':'')+'</span><span class="cx-v '+vcls+'">'+disp+'</span></div>';
  }
  var editBtn = canEdit ? '<button class="cx-edit" id="btn-cx-editar" title="Ajustar valores">✏️ Ajustar</button>' : '';
  return '<div class="card cx-card">'
    +'<div class="cx-head"><div class="card-title" style="margin:0">Caixa da empresa</div>'+editBtn+'</div>'
    +'<p class="cx-help">Quanto a empresa pode pagar de retiradas com segurança neste mês.</p>'
    +ln('Saldo no banco', extrato, 'cx-pos')
    +ln('(–) Contabilidade', -contab, 'cx-neg')
    +ln('(–) Impostos e encargos', -provisao, 'cx-neg', 'reserva de DAS/INSS do mês (≈6%)')
    +'<div class="cx-mininote">↑ Obrigações da empresa (PJ) — não saem do saldo individual das sócias.</div>'
    +ln('(–) Reserva de segurança', -reserva, 'cx-neg', 'sempre guardamos para imprevistos')
    +'<div class="cx-row cx-livre"><span class="cx-l">Caixa livre para retiradas</span><span class="cx-v">'+fmt(caixaLivre)+'</span></div>'
    +ln('(–) Retiradas das sócias', -totalDisp, 'cx-neg')
    +'<div class="cx-row cx-margem '+(ok?'ok':'bad')+'"><span class="cx-l">Margem após retiradas</span><span class="cx-v">'+(margem<0?'('+fmt(Math.abs(margem))+')':fmt(margem))+'</span></div>'
    +'<div class="cx-verdict '+(ok?'ok':'bad')+'">'+(ok?'✅ Caixa suficiente para todas as retiradas, com margem positiva.':'⚠️ Atenção: as retiradas previstas passam do caixa livre. Reveja antes de retirar.')+'</div>'
    +'</div>';
}

async function salvarCaixa(){
  var contab=parseFloat(document.getElementById('cx-contab').value); if(isNaN(contab)||contab<0) contab=0;
  var reserva=parseFloat(document.getElementById('cx-reserva').value); if(isNaN(reserva)||reserva<0) reserva=0;
  var btn=document.getElementById('btn-cx-salvar'); if(btn){ btn.disabled=true; btn.textContent='Salvando…'; }
  try{
    var res=await sb.from('nd_saldos_mes').update({contabilidade:contab,reserva_min:reserva}).eq('id',1).select().single();
    if(res.error) throw new Error(res.error.message);
    S.MAIO=res.data;
    S.caixaEdit=false;
    showToast('Caixa da empresa atualizado.');
    render();
  }catch(e){
    console.error('Erro salvar caixa:',e);
    showToast('Erro: '+e.message,true);
    if(btn){ btn.disabled=false; btn.textContent='Salvar'; }
  }
}

// Preview ao vivo do lançamento: parcelamento (despesa) e/ou divisão 50/50
function previewLanc(valorStr, flag, tipo, nParc){
  var v=parseFloat(valorStr);
  if(isNaN(v)||v<=0) return '';
  if(tipo==='despesa' && nParc>1){
    var pBase=Math.round((v/nParc)*100)/100;
    var pLast=Math.round((v - pBase*(nParc-1))*100)/100;
    var html='<div class="split"><p style="font-size:11px;font-weight:600;color:#856404;margin-bottom:8px">💳 '+nParc+'x de '+fmt(pBase)+(pLast!==pBase?' (última '+fmt(pLast)+')':'')+'</p>';
    if(flag==='conjunta'){
      html+='<div class="sr"><span style="font-size:12px">Cada parcela · Néia</span><span style="font-size:12px;font-weight:600">'+fmt(pBase/2)+'</span></div>'
        +'<div class="sr"><span style="font-size:12px">Cada parcela · Dany</span><span style="font-size:12px;font-weight:600">'+fmt(pBase/2)+'</span></div>';
    }
    html+='</div>';
    return html;
  }
  if(flag==='conjunta'){ return splitHtml(v/2); }
  return '';
}
function atualizarPreviewLanc(){
  var w=document.getElementById('split-wrap');
  if(w) w.innerHTML = previewLanc(S.form.valor, S.form.flag, S.form.tipo, (S.form.parcelas||1));
}
function hojeISO(){ var d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function addMonthsISO(dateStr, i){
  var p=(dateStr||'').split('-');
  var d=(p.length===3)?new Date(parseInt(p[0],10),parseInt(p[1],10)-1,parseInt(p[2],10)):new Date();
  d.setMonth(d.getMonth()+i);
  return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
}

function renderPacientes(){

  else if(filtro==='avaliar') lista = lista.filter(function(p){return p.status==='avaliacao'});
  else if(filtro==='pausados') lista = lista.filter(function(p){return p.status==='pausado'});
  else if(filtro==='alta') lista = lista.filter(function(p){return p.status==='alta'});

  var nAval=0;
  for(var k=0;k<S.PACIENTES.length;k++) if(S.PACIENTES[k].status==='avaliacao') nAval++;

  // Agrupa por Dra.
  var neia=[], dany=[];
  for(var i=0;i<lista.length;i++){
    if(lista[i].doutora==='neia') neia.push(lista[i]);
    else dany.push(lista[i]);

  var html = ''
    +'<div class="pac-h">'

    +'<div class="pac-h-tt">Pacientes</div>'

    +'</div>'
    +'<button class="pac-add" id="btn-pac-novo">+ Novo</button>'
    +'</div>';

// Normaliza texto para busca: sem acento, minúsculas
function normTxt(s){ return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase(); }
// Filtra os cards da lista de pacientes pelo campo de busca, sem re-render (preserva o foco)
function filtrarPacientesDOM(){
  var inp=document.getElementById('pac-busca'); if(!inp) return;
  var q=normTxt(inp.value);
  var cards=document.querySelectorAll('.pac[data-busca]');
  for(var i=0;i<cards.length;i++){
    var match = !q || cards[i].getAttribute('data-busca').indexOf(q)>=0;
    cards[i].style.display = match ? '' : 'none';
  }
  // esconde o grupo (Néia/Dany) que ficou sem nenhum card visível
  var grps=document.querySelectorAll('.pac-grp');
  for(var g=0;g<grps.length;g++){
    var any=false, vis=grps[g].querySelectorAll('.pac[data-busca]');
    for(var v=0;v<vis.length;v++){ if(vis[v].style.display!=='none'){ any=true; break; } }
    grps[g].style.display = any ? '' : 'none';
  }
}

async function salvarPaciente(){
  var f = S.pacForm || {};
  var nome = (document.getElementById('pf-nome').value||'').trim();
  if(!nome){ showToast('Informe o nome do paciente.', true); return; }

  var categoria = document.getElementById('pf-categoria').value || null;
  // Categoria é obrigatória só ao CADASTRAR novo; pacientes existentes podem ficar null (classificar depois)
  if(!f.id && !categoria){ showToast('Selecione a categoria do paciente.', true); return; }

  var doutora = document.getElementById('pf-doutora').value;

  var valor = parseFloat(document.getElementById('pf-valor').value)||null;
  var freq = document.getElementById('pf-freq').value;
  var freqObs = freq==='outra' ? (document.getElementById('pf-freq-obs').value||'').trim() : null;
  var status = S.pacForm.status || 'ativo';
  var tel = (document.getElementById('pf-tel').value||'').trim() || null;
  var nasc = document.getElementById('pf-nasc').value || null;
  var obs = (document.getElementById('pf-obs').value||'').trim() || null;
  var pag1 = (document.getElementById('pf-pag1').value||'').trim() || null;
  var pag2 = (document.getElementById('pf-pag2').value||'').trim() || null;

  // Origem de captação
  var origem = document.getElementById('pf-origem').value || null;
  var indicadoPor = (origem==='indicacao') ? ((document.getElementById('pf-indicado').value||'').trim() || null) : null;

  // Dados para NF
  var cpf = (document.getElementById('pf-cpf').value||'').trim() || null;
  var rg = (document.getElementById('pf-rg').value||'').trim() || null;
  var endRua = (document.getElementById('pf-rua').value||'').trim() || null;
  var endNum = (document.getElementById('pf-num').value||'').trim() || null;
  var endBairro = (document.getElementById('pf-bairro').value||'').trim() || null;
  var endCidade = (document.getElementById('pf-cidade').value||'').trim() || null;
  var endUf = (document.getElementById('pf-uf').value||'').trim().toUpperCase() || null;
  var endCep = (document.getElementById('pf-cep').value||'').trim() || null;

  var registro = {
    nome: nome,
    doutora: doutora,
    valor_padrao: valor,
    frequencia: freq,
    frequencia_obs: freqObs,
    status: status,
    telefone: tel,
    data_nascimento: nasc,
    observacao: obs,
    pagador_1: pag1,
    pagador_2: pag2,
    cpf: cpf,
    rg: rg,
    end_rua: endRua,
    end_numero: endNum,
    end_bairro: endBairro,
    end_cidade: endCidade,
    end_uf: endUf,
    end_cep: endCep,
    categoria: categoria,
    origem: origem,
    indicado_por: indicadoPor,
    criado_por: S.user.name
  };

  try {
    if(f.id){
      var res = await sb.from('nd_pacientes').update(registro).eq('id',f.id).select().single();
      if(res.error) throw new Error(res.error.message);
      // Atualiza local
      for(var i=0;i<S.PACIENTES.length;i++){
        if(S.PACIENTES[i].id===f.id){ S.PACIENTES[i] = res.data; break; }
      }
      showToast('Paciente atualizado.');
    } else {
      var res2 = await sb.from('nd_pacientes').insert(registro).select().single();
      if(res2.error) throw new Error(res2.error.message);
      S.PACIENTES.push(res2.data);
      // Reordena
      S.PACIENTES.sort(function(a,b){return (a.nome||'').localeCompare(b.nome||'')});
      // Conversão de avaliação (Parte B): vincula o paciente e marca a avaliação como convertida
      if(f._fromAval){
        var avc = await sb.from('nd_avaliacoes').update({status:'convertida', paciente_id:res2.data.id}).eq('id',f._fromAval).select().single();
        if(avc.error){ console.error('Erro vincular avaliacao:', avc.error); }
        else { for(var ai=0;ai<S.AVAL.length;ai++) if(S.AVAL[ai].id===f._fromAval){ S.AVAL[ai]=avc.data; break; } }
      }
      showToast(f._fromAval ? 'Avaliação convertida em paciente ✅' : 'Paciente cadastrado.');
    }
    S.pacForm = null;
    S.view = null;
    render();
  } catch(e){
    console.error('Erro salvar paciente:', e);
    showToast('Erro: '+e.message, true);
  }
}

async function excluirPaciente(){
  var f = S.pacForm;
  if(!f || !f.id) return;
  if(!confirm('Remover o paciente "'+f.nome+'" da lista?\n\nO registro fica preservado e o Fábio pode recuperar se for engano.')) return;
  try {
    var res = await sb.from('nd_pacientes').update({
      excluido: true,
      excluido_em: new Date().toISOString(),
      excluido_por: S.user.name
    }).eq('id', f.id);
    if(res.error) throw new Error(res.error.message);
    // Remove da lista local (some da visão imediatamente)
    S.PACIENTES = S.PACIENTES.filter(function(p){return p.id!==f.id});
    S.pacForm = null;
    S.view = null;
    showToast('Paciente removido.');
    render();
  } catch(e){
    console.error('Erro remover:', e);
    showToast('Erro: '+e.message, true);
  }
}

function uuidv4(){
  if(window.crypto && crypto.randomUUID){ try { return crypto.randomUUID(); } catch(e){} }
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    var r=Math.random()*16|0, v=(c==='x')?r:((r&0x3)|0x8);
    return v.toString(16);
  });

// data_hora é timestamptz (UTC). new Date(iso) volta para o fuso local → hora/dia corretos. Sem parse de string ano-mês.
function fmtHora(iso){ var d=new Date(iso); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
// ISO (UTC) -> valor de <input datetime-local> em hora local ('YYYY-MM-DDTHH:MM')
function isoToLocalInput(iso){
  var d=new Date(iso);
  return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+'T'+pad2(d.getHours())+':'+pad2(d.getMinutes());
}

// Domingo (00:00 local) da semana atual, deslocado por 'offset' semanas. Convenção do app: semana Dom→Sex.
function inicioSemana(offset){
  var n=new Date();

  d.setDate(d.getDate() - d.getDay() + offset*7);

}

  var ws=inicioSemana(S.semOffset);
  var fim=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()); fim.setDate(fim.getDate()+5); // Sexta
  var FATURAVEL={agendado:1, realizado:1, falta_faturada:1};
  function diaIdx(iso){ var d=new Date(iso); var dMid=new Date(d.getFullYear(),d.getMonth(),d.getDate()); return Math.round((dMid-ws)/86400000); }

  // Agrupa por dia E por doutora (coluna Dany | coluna Néia)
  var dias=[]; for(var d6=0;d6<6;d6++) dias.push({neia:[], dany:[]});
  var previsto=0, total=0;
  for(var i=0;i<S.ATEND.length;i++){
    var a=S.ATEND[i]; var diff=diaIdx(a.data_hora);
    if(diff>=0 && diff<=5){ var dr=(a.doutora==='dany')?'dany':'neia'; dias[diff][dr].push({tipo:'atend', dh:a.data_hora, obj:a}); total++; if(FATURAVEL[a.status] && a.valor!=null) previsto+=Number(a.valor); }
  }
  for(var av=0;av<S.AVAL.length;av++){
    var vv=S.AVAL[av]; var diffA=diaIdx(vv.data_hora);
    if(diffA>=0 && diffA<=5){ var drv=(vv.doutora==='dany')?'dany':'neia'; dias[diffA][drv].push({tipo:'aval', dh:vv.data_hora, obj:vv}); total++; }
  }
  function srt(arr){ arr.sort(function(x,y){return new Date(x.dh)-new Date(y.dh)}); }
  for(var z=0;z<6;z++){ srt(dias[z].dany); srt(dias[z].neia); }

  var lblIni=pad2(ws.getDate())+'/'+pad2(ws.getMonth()+1);
  var lblFim=pad2(fim.getDate())+'/'+pad2(fim.getMonth()+1);
  var sub = S.semOffset===0 ? 'Esta semana' : (S.semOffset<0 ? 'Semana anterior' : 'Próxima semana');
  var prevTxt = previsto>0 ? '<div class="at-wprev">Previsto faturável · '+fmt(previsto)+'</div>' : '';
  var col = S.agCol || 'ambas';  // 'ambas' = 2 colunas; 'dany'/'neia' = coluna única (mobile)

  function renderItens(arr){
    if(arr.length===0) return '<div class="at-day-empty">—</div>';
    var s=''; for(var j=0;j<arr.length;j++){ var it=arr[j]; s += (it.tipo==='aval') ? renderAvalCard(it.obj) : renderAtendCard(it.obj); } return s;
  }

  var html='<p class="stt">Atendimentos</p>'
    +atToggle('agenda')
    +'<div class="at-week">'
    +'<button class="at-wnav" id="btn-sem-prev">◀</button>'
    +'<div><div class="at-wlbl">'+lblIni+' – '+lblFim+'</div><div class="at-wsub">'+sub+' · '+total+' itens</div>'+prevTxt+'</div>'
    +'<button class="at-wnav" id="btn-sem-next">▶</button>'
    +'</div>'
    +'<div class="ag-coltoggle">'
    +'<button class="pac-fbtn'+(col==='ambas'?' on':'')+'" data-agcol="ambas">👥 Ambas</button>'
    +'<button class="pac-fbtn'+(col==='dany'?' on':'')+'" data-agcol="dany">Dra. Dany</button>'
    +'<button class="pac-fbtn'+(col==='neia'?' on':'')+'" data-agcol="neia">Dra. Néia</button>'
    +'</div>'
    +'<div class="pac-busca-wrap"><span class="pac-busca-ico">🔍</span><input type="text" id="ag-busca" class="pac-busca" placeholder="Buscar por nome…" value="'+escapeHtml(S.agBusca||'')+'"></div>'
    +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">'
    +(S.semOffset!==0?'<button class="pac-fbtn" id="btn-sem-hoje">Esta semana</button>':'')
    +'<button class="pac-add" id="btn-at-add" style="margin-left:auto">+ Novo</button>'
    +'</div>';

  html+='<div id="ag-list">';
  for(var k=0;k<6;k++){
    var dd=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()); dd.setDate(dd.getDate()+k);
    html+='<div class="at-day"><p class="at-day-tt">'+DIAS_SEM[k]+' · '+pad2(dd.getDate())+'/'+pad2(dd.getMonth()+1)+'</p>';
    if(col==='ambas'){
      html+='<div class="ag2-grid">'
        +'<div class="ag2-col"><div class="ag2-col-h dany">Dany</div>'+renderItens(dias[k].dany)+'</div>'
        +'<div class="ag2-col"><div class="ag2-col-h neia">Néia</div>'+renderItens(dias[k].neia)+'</div>'
        +'</div>';
    } else {
      html+=renderItens(dias[k][col]);
    }
    html+='</div>';
  }
  html+='</div>';
  return html;
}

// Recebíveis / previsão de caixa: projeta a entrada de receita a partir dos atendimentos
// faturáveis (agendado, realizado, falta faturada), agrupados por mês e SEMPRE individual por Dra.
// "A receber" = serviço prestado ou falta cobrável (realizado, falta_faturada). "Previsto" = agendado.
// Horizonte: do 1º dia do mês atual em diante (realizados do mês ainda contam como a receber).
function renderRecebiveis(){
  var FATURAVEL={agendado:1, realizado:1, falta_faturada:1};
  var CONFIRMADO={realizado:1, falta_faturada:1};
  var now=new Date();
  var floor=new Date(now.getFullYear(), now.getMonth(), 1); // 1º dia do mês atual, 00:00 local
  var buckets={neia:{}, dany:{}};
  for(var i=0;i<S.ATEND.length;i++){
    var a=S.ATEND[i];
    if(!FATURAVEL[a.status] || a.valor==null) continue;
    var d=new Date(a.data_hora);
    if(d<floor) continue;
    var dr=(a.doutora==='dany')?'dany':'neia';
    var mk=d.getFullYear()+'-'+pad2(d.getMonth()+1);
    var b=buckets[dr][mk] || (buckets[dr][mk]={conf:0, prev:0, nConf:0, nPrev:0, mi:d.getMonth(), yr:d.getFullYear()});
    var v=Number(a.valor);
    if(CONFIRMADO[a.status]){ b.conf+=v; b.nConf++; } else { b.prev+=v; b.nPrev++; }
  }

  // Totais por Dra
  var tot=function(cls){ var c=0,p=0,mks=Object.keys(buckets[cls]); for(var k=0;k<mks.length;k++){ c+=buckets[cls][mks[k]].conf; p+=buckets[cls][mks[k]].prev; } return {conf:c, prev:p}; };
  var tN=tot('neia'), tD=tot('dany');

  var recCard=function(name,cls,t){
    return '<div class="sc '+cls+'">'
      +'<div class="sc-name '+cls+'">'+name+'</div>'
      +'<div class="sc-line"><span class="sc-line-l">A receber</span><span class="sc-line-v">'+fmt(t.conf)+'</span></div>'
      +'<div class="sc-line"><span class="sc-line-l">Previsto</span><span class="sc-line-v">'+fmt(t.prev)+'</span></div>'
      +'<div class="sc-disp"><span class="sc-disp-l">Total projetado</span><span class="sc-disp-v">'+fmt(t.conf+t.prev)+'</span></div>'
      +'</div>';
  };

  var detalheDra=function(name,cls,dcolor){
    var mks=Object.keys(buckets[cls]).sort(); // 'YYYY-MM' ordena cronologicamente
    var inner='';
    if(mks.length===0){
      inner='<div class="rec-empty">Sem recebíveis futuros.</div>';
    } else {
      for(var m=0;m<mks.length;m++){
        var b=buckets[cls][mks[m]];
        inner+='<div class="rec-m">'
          +'<div class="rec-m-top"><span class="rec-m-mes">'+MESES[b.mi]+' '+b.yr+'</span><span class="rec-m-tot">'+fmt(b.conf+b.prev)+'</span></div>'
          +'<div class="rec-m-det">'
          +'<span class="rec-conf">● A receber '+fmt(b.conf)+' · '+b.nConf+'</span>'
          +'<span class="rec-prev">○ Previsto '+fmt(b.prev)+' · '+b.nPrev+'</span>'
          +'</div></div>';
      }
    }
    return '<div class="card"><div class="card-title" style="color:'+dcolor+'">Dra. '+name+' · por mês</div>'+inner+'</div>';
  };

  return '<p class="stt">Recebíveis</p>'
    +atToggle('receb')
    +'<p class="rec-sub">Previsão de entrada dos atendimentos faturáveis, do mês atual em diante.</p>'
    +'<div class="hero">'
    +'<div class="hero-label">Entrada projetada · individual por Dra</div>'
    +'<div class="scards">'+recCard('Néia','neia',tN)+recCard('Dany','dany',tD)+'</div>'
    +'<div class="hero-tl">Total geral projetado</div>'
    +'<div class="hero-tv">'+fmt(tN.conf+tN.prev+tD.conf+tD.prev)+'</div>'
    +'</div>'
    +detalheDra('Néia','neia','var(--neia-d)')
    +detalheDra('Dany','dany','var(--dany-d)');
}

async function salvarAvaliacao(){
  var nome=(document.getElementById('av-nome').value||'').trim();
  if(!nome){ showToast('Informe o nome.',true); return; }
  var dt=document.getElementById('av-dt').value;
  if(!dt){ showToast('Informe data e hora.',true); return; }
  var origem=document.getElementById('av-origem').value||null;
  var indicado=(origem==='indicacao')?((document.getElementById('av-indicado').value||'').trim()||null):null;
  var dr=document.getElementById('av-dr').value;
  var tel=(document.getElementById('av-tel').value||'').trim()||null;
  var valTxt=document.getElementById('av-val').value;
  var valor=valTxt!==''?parseFloat(valTxt):null; if(valor!=null && (isNaN(valor)||valor<0)) valor=null;
  var registro={ nome:nome, telefone:tel, origem:origem, indicado_por:indicado, doutora:dr, data_hora:new Date(dt).toISOString(), valor:valor, status:'agendada' };
  var btn=document.getElementById('btn-av-salvar'); if(btn){ btn.disabled=true; btn.textContent='Salvando…'; }
  try{
    var res=await sb.from('nd_avaliacoes').insert(registro).select().single();
    if(res.error) throw new Error(res.error.message);
    S.AVAL.push(res.data);
    S.atView=null;
    showToast('Avaliação agendada.');
    render();
  }catch(e){ console.error('Erro salvar avaliacao:',e); showToast('Erro: '+e.message,true); if(btn){ btn.disabled=false; btn.textContent='Salvar avaliação'; } }
}

async function mudarStatusAvaliacao(id,status){
  try{
    var res=await sb.from('nd_avaliacoes').update({status:status}).eq('id',id).select().single();
    if(res.error) throw new Error(res.error.message);
    for(var i=0;i<S.AVAL.length;i++) if(S.AVAL[i].id===id){ S.AVAL[i]=res.data; break; }
    showToast('Avaliação: '+avalStatusLabel(status));
    render();
  }catch(e){ console.error('Erro status avaliacao:',e); showToast('Erro: '+e.message,true); }
}

async function excluirAvaliacao(id){
  if(!confirm('Remover esta avaliação?\n\nSoft-delete: pode ser recuperada pelo Fábio.')) return;
  try{
    var res=await sb.from('nd_avaliacoes').update({ excluido:true, excluido_em:new Date().toISOString(), excluido_por:S.user.email }).eq('id',id);
    if(res.error) throw new Error(res.error.message);
    S.AVAL=S.AVAL.filter(function(v){return v.id!==id});
    showToast('Avaliação removida.');
    render();
  }catch(e){ console.error('Erro remover avaliacao:',e); showToast('Erro: '+e.message,true); }
}

// Parte B: abre o cadastro de paciente pré-preenchido com os dados da avaliação.
// _fromAval marca que, ao salvar, a avaliação deve virar 'convertida' com o paciente_id.
function converterAvaliacao(id){
  var v=null; for(var i=0;i<S.AVAL.length;i++) if(S.AVAL[i].id===id){ v=S.AVAL[i]; break; }
  if(!v) return;
  S.pacForm = {
    nome: v.nome,
    telefone: v.telefone,
    origem: v.origem,
    indicado_por: v.indicado_por,
    doutora: v.doutora||'neia',
    status: 'ativo',
    frequencia: '1x_semana',
    _fromAval: v.id
  };
  S.atView=null;
  S.view='pacForm';
  S.tab='pacientes';
  render();
}

async function marcarNaoConvertida(id){

    +'<button class="btn" id="btn-at-salvar">'+(ed?'Salvar alterações':'Salvar')+'</button>'
    +'</div>';
}

async function salvarAtendimento(){
  var pid=document.getElementById('at-pac').value;
  var dt=document.getElementById('at-dt').value;
  var dr=document.getElementById('at-dr').value;
  var obs=(document.getElementById('at-obs').value||'').trim()||null;
  if(!pid){ showToast('Selecione o paciente.',true); return; }
  if(!dt){ showToast('Informe data e hora.',true); return; }
  var valTxt=document.getElementById('at-val').value;
  var valor = valTxt!=='' ? parseFloat(valTxt) : null;
  if(valor!=null && (isNaN(valor)||valor<0)) valor=null;
  // dt = 'YYYY-MM-DDTHH:MM' (hora local). new Date() interpreta como local; toISOString() grava em UTC. Correto.
  var btn=document.getElementById('btn-at-salvar');

  // ── Edição de um atendimento existente (UPDATE; não mexe na série) ──
  if(S.atEdit){
    if(btn){ btn.disabled=true; btn.textContent='Salvando…'; }
    try{
      var resU=await sb.from('nd_atendimentos').update({
        paciente_id:parseInt(pid,10), doutora:dr, data_hora:new Date(dt).toISOString(), observacao:obs, valor:valor
      }).eq('id',S.atEdit.id).select().single();
      if(resU.error) throw new Error(resU.error.message);
      for(var u=0;u<S.ATEND.length;u++) if(S.ATEND[u].id===S.atEdit.id){ S.ATEND[u]=resU.data; break; }
      S.atEdit=null; S.atView=null;
      showToast('Atendimento atualizado.');
      render();
    }catch(e){
      console.error('Erro editar atendimento:',e);
      showToast('Erro: '+e.message,true);
      if(btn){ btn.disabled=false; btn.textContent='Salvar alterações'; }
    }
    return;
  }

  // ── Novo atendimento (INSERT, com recorrência opcional) ──
  var rep=document.getElementById('at-rep').value;
  var qtd=parseInt(document.getElementById('at-rep-qtd').value,10);
  if(!(qtd>0)) qtd=1;
  if(qtd>52) qtd=52;
  // Para a série, itero com setDate (preserva a hora local entre semanas e viradas de mês).
  var base=new Date(dt);
  var stepDias = rep==='quinzenal' ? 14 : 7;
  var n = rep==='nao' ? 1 : qtd;
  var sid = rep==='nao' ? null : uuidv4();
  var rows=[];
  for(var i=0;i<n;i++){
    var occ=new Date(base.getTime());
    occ.setDate(occ.getDate()+stepDias*i);
    rows.push({ paciente_id:parseInt(pid,10), doutora:dr, data_hora:occ.toISOString(), status:'agendado', observacao:obs, serie_id:sid, valor:valor });
  }
  if(btn){ btn.disabled=true; btn.textContent='Salvando…'; }
  try{
    var res=await sb.from('nd_atendimentos').insert(rows).select();
    if(res.error) throw new Error(res.error.message);
    for(var r=0;r<res.data.length;r++) S.ATEND.push(res.data[r]);
    S.atView=null;
    showToast(n>1 ? (n+' atendimentos agendados (série).') : 'Atendimento agendado.');
    render();
  }catch(e){
    console.error('Erro salvar atendimento:',e);
    showToast('Erro: '+e.message,true);
    if(btn){ btn.disabled=false; btn.textContent='Salvar'; }
  }
}

async function mudarStatusAtendimento(id,status){
  try{
    var res=await sb.from('nd_atendimentos').update({status:status}).eq('id',id).select().single();
    if(res.error) throw new Error(res.error.message);
    for(var i=0;i<S.ATEND.length;i++) if(S.ATEND[i].id===id){ S.ATEND[i]=res.data; break; }

    console.error('Erro status atendimento:',e);

}

async function excluirAtendimento(id){
  if(!confirm('Remover este atendimento?\n\nO registro é preservado (soft-delete) e pode ser recuperado pelo Fábio.')) return;
  try{
    var res=await sb.from('nd_atendimentos').update({
      excluido:true,
      excluido_em:new Date().toISOString(),
      excluido_por:S.user.email
    }).eq('id',id);
    if(res.error) throw new Error(res.error.message);
    S.ATEND=S.ATEND.filter(function(a){return a.id!==id});
    showToast('Atendimento removido.');
    render();
  }catch(e){
    console.error('Erro remover atendimento:',e);
    showToast('Erro: '+e.message,true);
  }
}

async function excluirSerie(serieId, fromIso){
  if(!confirm('Remover TODOS os atendimentos desta série a partir deste (inclusive os futuros)?\n\nSoft-delete: podem ser recuperados pelo Fábio.')) return;
  try{
    var res=await sb.from('nd_atendimentos').update({
      excluido:true,
      excluido_em:new Date().toISOString(),
      excluido_por:S.user.email
    }).eq('serie_id',serieId).eq('excluido',false).gte('data_hora',fromIso);
    if(res.error) throw new Error(res.error.message);
    var fromT=new Date(fromIso).getTime();
    S.ATEND=S.ATEND.filter(function(a){ return !(a.serie_id===serieId && new Date(a.data_hora).getTime()>=fromT); });
    showToast('Série removida (deste em diante).');
    render();
  }catch(e){
    console.error('Erro remover série:',e);
    showToast('Erro: '+e.message,true);
  }
}

function miniK(v){
  var a=Math.abs(v);
  if(a>=1000) return (v/1000).toFixed(1).replace('.',',')+'k';
  return ''+Math.round(v);
}
function montaMesesAno(){
  // Monta os 12 meses do ano a partir de nd_historico (fechados) + nd_saldos_mes (em andamento)
  var meses=[];
  for(var i=0;i<12;i++) meses.push({m:i+1,nome:MESES[i],has:false,rec_n:0,rec_d:0,desp_n:0,desp_d:0,plab_n:0,plab_d:0,prov_n:0,prov_d:0,res_n:0,res_d:0});
  for(var h=0;h<S.HIST.length;h++){
    var r=S.HIST[h]; var idx=parseInt(r.mes_key,10)-1;
    if(idx>=0&&idx<12){
      var mo=meses[idx]; mo.has=true;
      mo.rec_n=Number(r.rec_n); mo.rec_d=Number(r.rec_d);
      mo.desp_n=Number(r.desp_n); mo.desp_d=Number(r.desp_d);
      mo.plab_n=Number(r.plab_n); mo.plab_d=Number(r.plab_d);
      mo.prov_n=Number(r.prov_n); mo.prov_d=Number(r.prov_d);
      mo.res_n=Number(r.res_n); mo.res_d=Number(r.res_d);
    }
  }
  if(S.MAIO && S.MAIO.mes_ref){
    var cm=parseInt(S.MAIO.mes_ref.split('-')[1],10)-1;
    if(cm>=0&&cm<12){
      var M=S.MAIO; var mo2=meses[cm]; mo2.has=true;
      mo2.rec_n=Number(M.rec_n); mo2.rec_d=Number(M.rec_d);
      mo2.desp_n=Number(M.desp_n); mo2.desp_d=Number(M.desp_d);
      mo2.plab_n=Number(M.plab_n); mo2.plab_d=Number(M.plab_d);
      mo2.prov_n=Number(M.prov_n); mo2.prov_d=Number(M.prov_d);
      // Resultado do mês em andamento = receita − despesa − pró-labore − provisão (mesma fórmula do histórico)
      mo2.res_n=mo2.rec_n-mo2.desp_n-mo2.plab_n-mo2.prov_n;
      mo2.res_d=mo2.rec_d-mo2.desp_d-mo2.plab_d-mo2.prov_d;
    }
  }
  return meses;
}

function renderResultados(){
  var ano = (S.MAIO && S.MAIO.mes_ref) ? S.MAIO.mes_ref.split('-')[0] : '2026';
  var meses=montaMesesAno();

  // Totais do ano
  var T={rec:0,desp:0,plab:0,prov:0,res:0};
  for(var t=0;t<12;t++){ var mo=meses[t]; if(!mo.has) continue;
    T.rec+=mo.rec_n+mo.rec_d; T.desp+=mo.desp_n+mo.desp_d; T.plab+=mo.plab_n+mo.plab_d; T.prov+=mo.prov_n+mo.prov_d; T.res+=mo.res_n+mo.res_d;
  }

  var html='<p class="stt">Resultados '+ano+'</p><p class="ssub">Consolidado do ano · valores em R$</p>';

  // KPIs
  html+='<div class="res-kpis">'
    +'<div class="res-kpi"><div class="res-kpi-l">Receita bruta</div><div class="res-kpi-v res-pos">'+fmt(T.rec)+'</div></div>'
    +'<div class="res-kpi"><div class="res-kpi-l">Despesas</div><div class="res-kpi-v res-neg">'+fmt(T.desp)+'</div></div>'
    +'<div class="res-kpi"><div class="res-kpi-l">Pró-labore</div><div class="res-kpi-v res-neg">'+fmt(T.plab)+'</div></div>'
    +'<div class="res-kpi"><div class="res-kpi-l">Resultado</div><div class="res-kpi-v '+(T.res>=0?'res-pos':'res-neg')+'">'+fmt(T.res)+'</div></div>'
    +'</div>';

  // Gráfico A: Receita por mês (Néia + Dany empilhado)
  var maxRec=1;
  for(var a=0;a<12;a++){ var s=meses[a].rec_n+meses[a].rec_d; if(s>maxRec)maxRec=s; }
  var barsA='';
  for(var b=0;b<12;b++){ var m=meses[b]; var tot=m.rec_n+m.rec_d;
    if(m.has && tot>0){
      var bh=Math.round(tot/maxRec*90);
      var hn=Math.round(m.rec_n/tot*bh); var hd=bh-hn;
      barsA+='<div class="res-col"><div class="res-bw"><div class="res-bar" style="height:'+bh+'px">'
        +'<div class="res-seg-d" style="height:'+hd+'px"></div><div class="res-seg-n" style="height:'+hn+'px"></div>'
        +'</div></div><div class="res-col-m">'+m.nome+'</div><div class="res-col-v">'+miniK(tot)+'</div></div>';
    } else {
      barsA+='<div class="res-col"><div class="res-bw"><div style="width:22px;height:2px;background:#E8E5DE"></div></div><div class="res-col-m">'+m.nome+'</div><div class="res-col-v" style="color:#ccc">—</div></div>';
    }
  }
  html+='<div class="res-card"><div class="res-card-tt">Receita por mês</div>'
    +'<div class="res-chart">'+barsA+'</div>'
    +'<div class="res-legend"><span><span class="res-dot" style="background:var(--neia-d)"></span>Néia</span><span><span class="res-dot" style="background:var(--dany-d)"></span>Dany</span></div>'
    +'</div>';

  // Gráfico B: Resultado líquido por mês (verde/vermelho)
  var maxAbs=1;
  for(var c=0;c<12;c++){ if(meses[c].has){ var rr=Math.abs(meses[c].res_n+meses[c].res_d); if(rr>maxAbs)maxAbs=rr; } }
  var barsB='';
  for(var e=0;e<12;e++){ var m2=meses[e];
    if(m2.has){
      var rv=m2.res_n+m2.res_d; var bh2=Math.max(2,Math.round(Math.abs(rv)/maxAbs*84));
      barsB+='<div class="res-col"><div class="res-bw"><div class="'+(rv>=0?'res-bar-pos':'res-bar-neg')+'" style="width:22px;height:'+bh2+'px;border-radius:4px 4px 0 0"></div></div><div class="res-col-m">'+m2.nome+'</div><div class="res-col-v '+(rv>=0?'res-pos':'res-neg')+'">'+miniK(rv)+'</div></div>';
    } else {
      barsB+='<div class="res-col"><div class="res-bw"><div style="width:22px;height:2px;background:#E8E5DE"></div></div><div class="res-col-m">'+m2.nome+'</div><div class="res-col-v" style="color:#ccc">—</div></div>';
    }
  }
  html+='<div class="res-card"><div class="res-card-tt">Resultado líquido por mês</div>'
    +'<div class="res-chart">'+barsB+'</div></div>';

  // Tabela anual completa
  html+=renderResTabela(meses);
  return html;
}

function renderResTabela(meses){
  function fmtCell(v){
    if(v===0) return '<span class="res-zero">0</span>';
    var cls=v>0?'res-pos':'res-neg';
    var txt=v<0?'('+Math.round(Math.abs(v)).toLocaleString('pt-BR')+')':Math.round(v).toLocaleString('pt-BR');
    return '<span class="'+cls+'">'+txt+'</span>';
  }
  function row(label,get,cls){
    var cells=''; var tot=0;
    for(var i=0;i<12;i++){ var mo=meses[i];
      if(mo.has){ var v=get(mo); tot+=v; cells+='<td>'+fmtCell(v)+'</td>'; }
      else { cells+='<td><span class="res-mut">—</span></td>'; }
    }
    cells+='<td class="res-totcol">'+fmtCell(tot)+'</td>';
    return '<tr'+(cls?' class="'+cls+'"':'')+'><td class="res-desc">'+label+'</td>'+cells+'</tr>';
  }
  function sec(t){ return '<tr class="res-sec"><td colspan="14">'+t+'</td></tr>'; }
  var head='<tr><th class="res-desc">Descrição</th>';
  for(var i=0;i<12;i++) head+='<th>'+meses[i].nome+'</th>';
  head+='<th class="res-totcol">Total</th></tr>';
  var body=''
    +sec('Receitas')
    +row('Néia',function(m){return m.rec_n;})
    +row('Dany',function(m){return m.rec_d;})
    +row('Total',function(m){return m.rec_n+m.rec_d;},'res-tot')
    +sec('Despesas operacionais')
    +row('Néia',function(m){return -m.desp_n;})
    +row('Dany',function(m){return -m.desp_d;})
    +row('Total',function(m){return -(m.desp_n+m.desp_d);},'res-tot')
    +sec('Pró-labore (retiradas)')
    +row('Néia',function(m){return -m.plab_n;})
    +row('Dany',function(m){return -m.plab_d;})
    +row('Total',function(m){return -(m.plab_n+m.plab_d);},'res-tot')
    +sec('Provisão encargos')
    +row('Néia',function(m){return -m.prov_n;})
    +row('Dany',function(m){return -m.prov_d;})
    +row('Total',function(m){return -(m.prov_n+m.prov_d);},'res-tot')
    +sec('Resultado líquido')
    +row('Néia',function(m){return m.res_n;})
    +row('Dany',function(m){return m.res_d;})
    +row('Total',function(m){return m.res_n+m.res_d;},'res-tot');
  return '<div class="res-card-tt" style="margin:8px 0 8px 2px">Tabela anual (R$, arredondado)</div>'
    +'<div class="res-tablewrap"><table class="res-table"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>'
    +'<p style="font-size:10px;color:var(--gray);margin-top:8px;text-align:center">Despesas, pró-labore e provisão exibidos como negativos (saídas). Mês em andamento incluído.</p>';
}

// ═══════════════════════════════════════════════════════════════
// COMPRAS A PRAZO (parcelamentos) — agrupa parcelas pelo "(i/N)" da descrição
// ═══════════════════════════════════════════════════════════════
function fmtVenc(v){ if(!v) return '—'; var p=String(v).split('-'); return (p.length===3)?(p[2]+'/'+p[1]+'/'+p[0]):v; }
// Mês ('YYYY-MM' no fuso local) de um timestamp created_at — para agrupar a Trilha por mês
function mesKeyLocal(iso){ if(!iso) return ''; var d=new Date(iso); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }
function listarParcelamentos(){
  var mesAtual=(S.MAIO && S.MAIO.mes_ref)?String(S.MAIO.mes_ref).slice(0,7):'';
  var re=/^(.*?)\s*\((\d+)\/(\d+)\)\s*$/;  // captura "Descrição (i/N)"
  var grupos={};
  for(var i=0;i<S.LANC.length;i++){
    var t=S.LANC[i];
    if(t.origem==='extrato'||t.tipo!=='despesa') continue;
    var m=re.exec(t.descricao||'');
    if(!m) continue;
    var base=m[1].trim(), n=parseInt(m[3],10), idx=parseInt(m[2],10);
    var key=base+'|'+n;
    if(!grupos[key]) grupos[key]={desc:base,n:n,parcelas:[]};
    grupos[key].parcelas.push({i:idx,valor:Number(t.valor),venc:t.venc});
  }
  var arr=[];
  for(var k in grupos){
    var g=grupos[k];
    g.parcelas.sort(function(a,b){return a.i-b.i});
    var total=0,futuras=0,prox=null;
    for(var p=0;p<g.parcelas.length;p++){
      var pc=g.parcelas[p]; total+=pc.valor;
      var vm=pc.venc?String(pc.venc).slice(0,7):null;
      if(vm && mesAtual && vm>mesAtual){ futuras++; if(!prox) prox=pc; }
    }
    g.total=total; g.futuras=futuras; g.prox=prox;
    arr.push(g);
  }
  arr.sort(function(a,b){return b.futuras-a.futuras});
  return arr;
}
function renderCompraCard(g){
  var proxTxt = (g.futuras>0 && g.prox) ? ('Próxima: <strong>'+fmtVenc(g.prox.venc)+'</strong> ('+fmt(g.prox.valor)+')') : '✅ Todas as parcelas já entraram no caixa';
  return '<div class="cp-card">'
    +'<div class="cp-top"><span class="cp-desc">🛒 '+escapeHtml(g.desc)+'</span><span class="cp-total">'+fmt(g.total)+'</span></div>'
    +'<div class="cp-meta">'+g.n+'x · <strong>'+g.futuras+' a vencer</strong> · '+(g.n-g.futuras)+' de '+g.n+' já no caixa</div>'
    +'<div class="cp-prox">'+proxTxt+'</div>'
    +'</div>';
}

function renderAudit(){
  var sorted=S.LANC.slice().reverse();
  var html='<p class="stt">Trilha de Auditoria</p><p class="ssub">Movimentações do extrato e lançamentos manuais</p>';
  // Compras a prazo (parcelamentos) no topo
  var parcs=listarParcelamentos();
  if(parcs.length){
    html+='<div class="cp-sec">🛒 Compras a prazo</div>';
    for(var c=0;c<parcs.length;c++) html+=renderCompraCard(parcs[c]);
    html+='<p class="stt" style="font-size:16px;margin-top:18px">Lançamentos</p>';
  }

    html+='<div class="empty"><div style="font-size:36px;opacity:.3;margin-bottom:10px">🔍</div><p>Nenhum registro ainda</p></div>';
  }else{

      var mk=mesKeyLocal(t.created_at);

      var catObj=null;
      for(var j=0;j<CATS.length;j++)if(CATS[j].id===t.cat)catObj=CATS[j];
      var badgeOrigem=t.origem==='extrato'?'<span style="display:inline-block;font-size:9px;font-weight:600;background:#E8E5DE;color:#666;padding:1px 6px;border-radius:20px;margin-left:6px;letter-spacing:.3px">SICOOB</span>':'';
      html+='<div class="aud">'
        +'<div class="aud-h"><span class="aud-u">👤 '+escapeHtml(t.por)+badgeOrigem+'</span><span class="aud-t">'+escapeHtml(t.em)+'</span></div>'
        +'<div class="aud-d">'+(t.tipo==='receita'?'💰':'💸')+' '+escapeHtml(t.descricao)+'</div>'
        +'<div class="aud-x">'+fmt(Number(t.valor))+' · '
        +(t.flag==='conjunta'?'🤝 Conjunta (÷2)':t.flag==='neia'?'🔵 Néia':'🟢 Dany')
        +(catObj?' · '+catObj.i+' '+catObj.l:'')
        +(t.venc?' · Vence '+escapeHtml(t.venc):'')
        +(t.obs?' · "'+escapeHtml(t.obs)+'"':'')
        +'</div></div>';
    }
  }
  html+='<div style="text-align:center;margin-top:20px"><button class="btn btn-sec btn-sm" id="btn-sair2">Sair</button></div>';
  return html;
}

function renderTx(t){
  var isRec=t.tipo==='receita';
  var ic=isRec?'rec':(t.flag==='conjunta'?'conj':'desp');
  var ico=isRec?'💰':(t.flag==='conjunta'?'🤝':'💸');
  var tagC=t.flag==='conjunta'?'tag-c':(t.flag==='neia'?'tag-n':'tag-d');
  var tagL=t.flag==='conjunta'?'Conjunta':(t.flag==='neia'?'Néia':'Dany');
  var badgeOrigem=t.origem==='extrato'?'<span style="display:inline-block;font-size:9px;font-weight:600;background:#E8E5DE;color:#666;padding:1px 6px;border-radius:20px;margin-left:4px;letter-spacing:.3px">SICOOB</span>':'';
  return '<div class="tx">'
    +'<div class="tx-icon '+ic+'">'+ico+'</div>'
    +'<div class="tx-info">'
    +'<div class="tx-name">'+escapeHtml(t.descricao)+'</div>'
    +'<div class="tx-meta">'+escapeHtml(t.data)+' · '+escapeHtml(t.por)+'</div>'
    +'<span class="tx-tag '+tagC+'">'+tagL+'</span>'+badgeOrigem+'</div>'
    +'<div class="tx-amt '+(isRec?'pos':'neg')+'">'+(isRec?'+':'-')+fmt(Number(t.valor))+'</div>'
    +'</div>';
}

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function bindLogin(){
  var btn=document.getElementById('btn-entrar');
  if(btn)btn.addEventListener('click',fazerLogin);
  var pw=document.getElementById('ipw');
  if(pw)pw.addEventListener('keypress',function(e){if(e.key==='Enter')fazerLogin();});
}

function bindApp(){
  var navItems=document.querySelectorAll('.ni[data-tab]');
  for(var i=0;i<navItems.length;i++){
    (function(b){b.addEventListener('click',function(){
      S.tab=b.dataset.tab;
      S.view=null;
      S.pacForm=null;
      S.atView=null;
      S.atEdit=null;
      S.caixaEdit=false;
      S.semOffset=0;
      render();
    });})(navItems[i]);
  }
  var togglers=document.querySelectorAll('[data-toggle]');
  for(var j=0;j<togglers.length;j++){
    (function(el){el.addEventListener('click',function(){var k=el.dataset.toggle;S.abre[k]=!S.abre[k];render();});})(togglers[j]);
  }
  var tipos=document.querySelectorAll('[data-tipo]');
  for(var t=0;t<tipos.length;t++){
    (function(c){c.addEventListener('click',function(){S.form.tipo=c.dataset.tipo;S.form.flag=c.dataset.tipo==='despesa'?'conjunta':'neia';render();});})(tipos[t]);
  }
  var flags=document.querySelectorAll('[data-flag]');
  for(var f=0;f<flags.length;f++){
    (function(b){b.addEventListener('click',function(){S.form.flag=b.dataset.flag;render();});})(flags[f]);
  }
  var fv=document.getElementById('f-val');
  if(fv)fv.addEventListener('input',function(e){
    S.form.valor=e.target.value;
    atualizarPreviewLanc(); // atualiza só o preview, sem re-render (preserva foco)
  });
  var fp=document.getElementById('f-parc');
  if(fp)fp.addEventListener('input',function(e){
    var n=parseInt(e.target.value,10);
    S.form.parcelas=(n>0?n:1);
    atualizarPreviewLanc();
  });
  var fd=document.getElementById('f-desc');
  if(fd)fd.addEventListener('input',function(e){S.form.desc=e.target.value;});
  var fc=document.getElementById('f-cat');
  if(fc)fc.addEventListener('change',function(e){S.form.cat=e.target.value;});
  var fvc=document.getElementById('f-venc');
  if(fvc)fvc.addEventListener('change',function(e){S.form.venc=e.target.value;});
  var fo=document.getElementById('f-obs');
  if(fo)fo.addEventListener('input',function(e){S.form.obs=e.target.value;});
  var bs=document.getElementById('btn-salvar');
  if(bs)bs.addEventListener('click',salvar);
  var s1=document.getElementById('btn-sair');
  if(s1)s1.addEventListener('click',sair);
  var s2=document.getElementById('btn-sair2');
  if(s2)s2.addEventListener('click',sair);

  // ── Caixa da Empresa ──
  var btnCxEditar=document.getElementById('btn-cx-editar');
  if(btnCxEditar)btnCxEditar.addEventListener('click',function(){ S.caixaEdit=true; render(); });
  var btnCxCancelar=document.getElementById('btn-cx-cancelar');
  if(btnCxCancelar)btnCxCancelar.addEventListener('click',function(){ S.caixaEdit=false; render(); });
  var btnCxSalvar=document.getElementById('btn-cx-salvar');
  if(btnCxSalvar)btnCxSalvar.addEventListener('click',salvarCaixa);

  // ── Pacientes ──
  var btnPacNovo=document.getElementById('btn-pac-novo');
  if(btnPacNovo)btnPacNovo.addEventListener('click',function(){
    S.pacForm={status:'ativo',frequencia:'1x_semana'};
    S.view='pacForm';
    render();
  });
  var pacCards=document.querySelectorAll('[data-pac]');
  for(var p=0;p<pacCards.length;p++){
    (function(c){c.addEventListener('click',function(){
      var pid=parseInt(c.dataset.pac,10);
      for(var k=0;k<S.PACIENTES.length;k++){
        if(S.PACIENTES[k].id===pid){
          // Clone para edição (objeto separado)
          var pat=S.PACIENTES[k];
          S.pacForm={};
          for(var key in pat) S.pacForm[key]=pat[key];
          S.view='pacForm';
          render();
          return;
        }
      }
    });})(pacCards[p]);
  }
  var fbs=document.querySelectorAll('[data-fp]');
  for(var fb=0;fb<fbs.length;fb++){
    (function(b){b.addEventListener('click',function(){S.pacFiltro=b.dataset.fp;render();});})(fbs[fb]);
  }
  var pacBusca=document.getElementById('pac-busca');
  if(pacBusca){ pacBusca.addEventListener('input',function(e){ S.pacBusca=e.target.value; filtrarPacientesDOM(); }); filtrarPacientesDOM(); }
  var sts=document.querySelectorAll('[data-st]');
  for(var st=0;st<sts.length;st++){
    (function(b){b.addEventListener('click',function(){
      if(!S.pacForm)S.pacForm={};
      S.pacForm.status=b.dataset.st;
      render();
    });})(sts[st]);
  }
  var pfFreq=document.getElementById('pf-freq');
  if(pfFreq)pfFreq.addEventListener('change',function(e){
    var w=document.getElementById('pf-freq-obs-wrap');
    if(w) w.style.display = (e.target.value==='outra') ? '' : 'none';
    if(!S.pacForm)S.pacForm={};
    S.pacForm.frequencia=e.target.value;
  });
  var pfOrigem=document.getElementById('pf-origem');
  if(pfOrigem)pfOrigem.addEventListener('change',function(e){
    var w=document.getElementById('pf-indicado-wrap');
    if(w) w.style.display = (e.target.value==='indicacao') ? '' : 'none';
  });
  var btnPfCancelar=document.getElementById('btn-pf-cancelar');
  if(btnPfCancelar)btnPfCancelar.addEventListener('click',function(){
    S.pacForm=null;
    S.view=null;
    render();
  });
  var btnPfSalvar=document.getElementById('btn-pf-salvar');
  if(btnPfSalvar)btnPfSalvar.addEventListener('click',salvarPaciente);
  var btnPfExcluir=document.getElementById('btn-pf-excluir');
  if(btnPfExcluir)btnPfExcluir.addEventListener('click',excluirPaciente);
  var btnPacVoltar=document.getElementById('btn-pac-voltar');
  if(btnPacVoltar)btnPacVoltar.addEventListener('click',function(){
    S.pacForm=null;
    S.view=null;
    render();
  });

  // ── Atendimentos (Onda 2.A) ──
  var btnAtAgenda=document.getElementById('btn-at-agenda');
  if(btnAtAgenda)btnAtAgenda.addEventListener('click',function(){ S.atView=null; render(); });
  var btnAtReceb=document.getElementById('btn-at-receb');
  if(btnAtReceb)btnAtReceb.addEventListener('click',function(){ S.atView='receb'; render(); });
  var btnAtAdd=document.getElementById('btn-at-add');
  if(btnAtAdd)btnAtAdd.addEventListener('click',function(){ S.atEdit=null; S.atView='form'; render(); });
  var agCols=document.querySelectorAll('[data-agcol]');
  for(var ac=0;ac<agCols.length;ac++){
    (function(b){b.addEventListener('click',function(){ S.agCol=b.dataset.agcol; render(); });})(agCols[ac]);
  }
  var agBusca=document.getElementById('ag-busca');
  if(agBusca){ agBusca.addEventListener('input',function(e){ S.agBusca=e.target.value; filtrarAgendaDOM(); }); filtrarAgendaDOM(); }
  var btnAtCancelar=document.getElementById('btn-at-cancelar');
  if(btnAtCancelar)btnAtCancelar.addEventListener('click',function(){ S.atView=null; S.atEdit=null; render(); });
  var atEdits=document.querySelectorAll('[data-at-edit]');
  for(var ae=0;ae<atEdits.length;ae++){
    (function(b){b.addEventListener('click',function(){
      var eid=parseInt(b.dataset.atEdit,10);
      for(var k=0;k<S.ATEND.length;k++){ if(S.ATEND[k].id===eid){ var c={}; for(var key in S.ATEND[k]) c[key]=S.ATEND[k][key]; S.atEdit=c; S.atView='form'; render(); return; } }
    });})(atEdits[ae]);
  }
  var btnAtSalvar=document.getElementById('btn-at-salvar');
  if(btnAtSalvar)btnAtSalvar.addEventListener('click',salvarAtendimento);
  var atPac=document.getElementById('at-pac');
  if(atPac)atPac.addEventListener('change',function(e){
    // Pré-preenche a doutora com a do paciente (mas o usuário pode trocar depois)
    var opt=e.target.options[e.target.selectedIndex];
    var dr=opt?opt.getAttribute('data-dr'):'';
    if(dr){ var sel=document.getElementById('at-dr'); if(sel) sel.value=dr; }
    // Pré-preenche o valor com o valor_padrao do paciente (editável)
    var vv=opt?opt.getAttribute('data-valor'):'';
    var vi=document.getElementById('at-val'); if(vi && vv) vi.value=vv;
  });
  var atPacBusca=document.getElementById('at-pac-busca');
  if(atPacBusca)atPacBusca.addEventListener('input',function(e){
    var q=normTxt(e.target.value);
    var sel=document.getElementById('at-pac'); if(!sel) return;
    for(var i=0;i<sel.options.length;i++){
      var o=sel.options[i], b=o.getAttribute('data-busca');
      if(b===null) continue; // a opção "Selecione…" não tem data-busca
      o.hidden = !!(q && b.indexOf(q)<0);
    }
  });
  var atRep=document.getElementById('at-rep');
  if(atRep)atRep.addEventListener('change',function(e){
    var w=document.getElementById('at-rep-qtd-wrap');
    if(w) w.style.display = (e.target.value==='nao') ? 'none' : '';
  });
  var btnSemPrev=document.getElementById('btn-sem-prev');
  if(btnSemPrev)btnSemPrev.addEventListener('click',function(){ S.semOffset--; render(); });
  var btnSemNext=document.getElementById('btn-sem-next');
  if(btnSemNext)btnSemNext.addEventListener('click',function(){ S.semOffset++; render(); });
  var btnSemHoje=document.getElementById('btn-sem-hoje');
  if(btnSemHoje)btnSemHoje.addEventListener('click',function(){ S.semOffset=0; render(); });
  var atSts=document.querySelectorAll('[data-at-st]');
  for(var as=0;as<atSts.length;as++){
    (function(b){b.addEventListener('click',function(){
      mudarStatusAtendimento(parseInt(b.dataset.atId,10), b.dataset.atSt);
    });})(atSts[as]);
  }
  var atDels=document.querySelectorAll('[data-at-del]');
  for(var ad=0;ad<atDels.length;ad++){
    (function(b){b.addEventListener('click',function(){
      excluirAtendimento(parseInt(b.dataset.atDel,10));
    });})(atDels[ad]);
  }
  var atDelSeries=document.querySelectorAll('[data-at-delserie]');
  for(var ds=0;ds<atDelSeries.length;ds++){
    (function(b){b.addEventListener('click',function(){
      excluirSerie(b.dataset.atDelserie, b.dataset.atFrom);
    });})(atDelSeries[ds]);
  }

  // ── Avaliações (leads) — Parte A ──
  var btnNovoAtend=document.getElementById('btn-novo-atend');
  if(btnNovoAtend)btnNovoAtend.addEventListener('click',function(){ S.atEdit=null; S.atView='form'; render(); });
  var btnNovoAval=document.getElementById('btn-novo-aval');
  if(btnNovoAval)btnNovoAval.addEventListener('click',function(){ S.atView='aval'; render(); });
  var avOrigem=document.getElementById('av-origem');
  if(avOrigem)avOrigem.addEventListener('change',function(e){
    var w=document.getElementById('av-indicado-wrap');
    if(w) w.style.display = (e.target.value==='indicacao') ? '' : 'none';
  });
  var btnAvSalvar=document.getElementById('btn-av-salvar');
  if(btnAvSalvar)btnAvSalvar.addEventListener('click',salvarAvaliacao);
  var btnAvCancelar=document.getElementById('btn-av-cancelar');
  if(btnAvCancelar)btnAvCancelar.addEventListener('click',function(){ S.atView=null; render(); });
  var avSts=document.querySelectorAll('[data-av-st]');
  for(var avs=0;avs<avSts.length;avs++){
    (function(b){b.addEventListener('click',function(){
      mudarStatusAvaliacao(parseInt(b.dataset.avId,10), b.dataset.avSt);
    });})(avSts[avs]);
  }
  var avDels=document.querySelectorAll('[data-av-del]');
  for(var avd=0;avd<avDels.length;avd++){
    (function(b){b.addEventListener('click',function(){
      excluirAvaliacao(parseInt(b.dataset.avDel,10));
    });})(avDels[avd]);
  }
  var avConvs=document.querySelectorAll('[data-av-conv]');
  for(var avc=0;avc<avConvs.length;avc++){
    (function(b){b.addEventListener('click',function(){ converterAvaliacao(parseInt(b.dataset.avConv,10)); });})(avConvs[avc]);
  }
  var avNaoConvs=document.querySelectorAll('[data-av-naoconv]');
  for(var anc=0;anc<avNaoConvs.length;anc++){
    (function(b){b.addEventListener('click',function(){ marcarNaoConvertida(parseInt(b.dataset.avNaoconv,10)); });})(avNaoConvs[anc]);
  }
}
